name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Create a clean orphan branch with no history
          git checkout --orphan hf-deploy
          
          # Remove the binary architecture diagram from the deployment branch
          git rm --cached "Indra Architecture Diagram.png" || true
          rm "Indra Architecture Diagram.png" || true
          
          # Inject Hugging Face Space metadata into README.md dynamically
          cat << 'EOF' > hf_header.txt
---
title: INDRA Supply Chain Digital Twin
emoji: 🛡️
colorFrom: blue
colorTo: green
sdk: docker
app_port: 7860
---

EOF
          cat hf_header.txt README.md > temp_readme.md
          mv temp_readme.md README.md
          rm hf_header.txt
          
          # Stage and commit only the application files
          git add .
          git commit -m "Deploy clean container to Hugging Face Spaces with injected metadata"
          
          # Force push the hf-deploy branch to the Hugging Face main branch
          git push --force https://raj0120:$HF_TOKEN@huggingface.co/spaces/raj0120/indra hf-deploy:main
