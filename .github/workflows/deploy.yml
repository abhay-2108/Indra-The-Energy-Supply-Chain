name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Create a clean orphan branch with no history
          git checkout --orphan hf-deploy
          
          # Remove all binary images from the deployment branch to prevent Hugging Face pre-receive hook rejection
          find . -type f \( -name "*.png" -o -name "*.jpg" -o -name "*.jpeg" -o -name "*.gif" -o -name "*.webp" \) | while read -r file; do
            echo "Removing binary file: $file"
            git rm --cached "$file" || true
            rm -f "$file" || true
          done
          
          # Inject Hugging Face Space metadata into README.md dynamically
          echo "---" > hf_header.txt
          echo "title: INDRA Supply Chain Digital Twin" >> hf_header.txt
          echo "emoji: 🛡️" >> hf_header.txt
          echo "colorFrom: blue" >> hf_header.txt
          echo "colorTo: green" >> hf_header.txt
          echo "sdk: docker" >> hf_header.txt
          echo "app_port: 7860" >> hf_header.txt
          echo "---" >> hf_header.txt
          echo "" >> hf_header.txt
          cat hf_header.txt README.md > temp_readme.md
          mv temp_readme.md README.md
          rm hf_header.txt
          
          # Verify file contents in output log
          echo "=== FIRST 10 LINES OF GENERATED README ==="
          head -n 10 README.md
          echo "=========================================="
          
          # Stage and commit only the application files
          git add .
          git commit -m "Deploy clean container to Hugging Face Spaces with injected metadata"
          
          # Force push the hf-deploy branch to the Hugging Face main branch
          git push --force https://raj0120:$HF_TOKEN@huggingface.co/spaces/raj0120/indra hf-deploy:main
