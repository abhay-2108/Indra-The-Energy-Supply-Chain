name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Force push to the Hugging Face Space repository
          # NOTE: Adjust the Space name 'abhay-2108/Indra-The-Energy-Supply-Chain' below if it is different on Hugging Face.
          git push --force https://raj0120:$HF_TOKEN@huggingface.co/spaces/raj0120/indra main:main
